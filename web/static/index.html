<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimi Wire Web</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --sidebar-bg: #1a1a1a;
    --sidebar-text: #a0a0a0;
    --sidebar-active: #2a2a2a;
    --main-bg: #f5f5f7;
    --surface: #ffffff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-secondary: #666;
    --accent: #1976d2;
    --accent-hover: #1565c0;
    --user-bubble: #e3f2fd;
    --ai-bubble: #ffffff;
    --tool-bg: #f0f7ff;
    --think-bg: #f3e5f5;
    --danger: #d32f2f;
    --success: #2e7d32;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--main-bg); color: var(--text); }

  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text);
    display: flex; flex-direction: column; flex-shrink: 0; user-select: none;
  }
  .sidebar-header {
    padding: 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333;
  }
  .logo-icon {
    width: 28px; height: 28px; background: var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 14px;
  }
  .logo-text { color: #fff; font-weight: 600; font-size: 15px; }
  .logo-version { color: #666; font-size: 11px; margin-left: auto; }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: #666;
    margin-bottom: 8px; padding: 0 8px;
  }
  .session-item {
    padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; color: #ccc;
    cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between;
  }
  .session-item:hover { background: #252525; }
  .session-item.active { background: var(--sidebar-active); color: #fff; }
  .session-time { font-size: 11px; color: #666; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Topbar */
  .topbar {
    height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0;
  }
  .topbar-title { font-weight: 600; font-size: 15px; }
  .topbar-path {
    font-size: 13px; color: var(--text-secondary); background: #f5f5f5; padding: 4px 10px;
    border-radius: 6px; font-family: "SF Mono", Monaco, monospace;
  }

  /* Chat */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 4px;
  }
  .chat-inner { max-width: 900px; width: 100%; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; gap: 4px; }

  .message-row { display: flex; gap: 12px; padding: 8px 0; }
  .message-row.user { justify-content: flex-end; }
  .message-row.assistant { justify-content: flex-start; }
  .message-row.system { justify-content: center; }
  .message-row.tool { justify-content: flex-start; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;
  }
  .avatar.user { background: var(--accent); color: #fff; }
  .avatar.ai { background: #e0e0e0; color: #555; }

  .bubble {
    max-width: 85%; padding: 12px 16px; border-radius: var(--radius); font-size: 15px; line-height: 1.65;
    box-shadow: var(--shadow); word-break: break-word;
  }
  .bubble.user { background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .bubble.assistant { background: var(--ai-bubble); border-bottom-left-radius: 4px; }
  .bubble.system { background: #fff9c4; font-size: 13px; color: #666; box-shadow: none; }
  .bubble.think { background: var(--think-bg); font-size: 13px; color: #555; box-shadow: none; border: 1px solid #e1bee7; }
  .bubble.tool { background: var(--tool-bg); font-size: 13px; box-shadow: none; border: 1px solid #bbdefb; }
  .bubble.error { background: #ffebee; color: #c62828; font-size: 13px; box-shadow: none; }

  .bubble :is(h1,h2,h3,h4) { margin: 10px 0 6px; font-weight: 600; }
  .bubble p { margin: 6px 0; }
  .bubble pre {
    background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: var(--radius-sm);
    overflow-x: auto; font-size: 13px; margin: 8px 0;
  }
  .bubble code {
    background: #f0f0f0; padding: 2px 5px; border-radius: 4px; font-size: 13px; font-family: "SF Mono", Monaco, monospace;
  }
  .bubble pre code { background: transparent; padding: 0; }
  .bubble ul, .bubble ol { margin: 6px 0; padding-left: 24px; }
  .bubble img { max-width: 100%; border-radius: var(--radius-sm); }
  .bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
  .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .bubble th { background: #f5f5f5; }

  /* Input Panel */
  .input-panel {
    background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px 16px; flex-shrink: 0;
  }
  .status-bar {
    display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-secondary);
    margin-bottom: 8px; padding: 0 4px;
  }
  .status-bar .dot {
    width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; background: #ccc;
  }
  .status-bar .dot.connected { background: var(--success); }
  .status-bar .dot.busy { background: #ff9800; }
  .status-bar .dot.error { background: var(--danger); }
  .context-bar { display: flex; align-items: center; gap: 12px; }
  .context-pill {
    background: #f5f5f5; padding: 2px 10px; border-radius: 12px; font-size: 11px; color: var(--text-secondary);
  }

  .input-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: var(--accent); }
  .input-box textarea {
    width: 100%; resize: none; border: none; outline: none; padding: 14px 16px;
    font-size: 15px; line-height: 1.5; font-family: inherit; background: transparent; min-height: 52px; max-height: 200px;
  }
  .input-toolbar {
    display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-top: 1px solid #f0f0f0;
  }
  .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;
    color: var(--text-secondary); transition: background 0.15s;
  }
  .icon-btn:hover { background: #f0f0f0; }
  .icon-btn.danger:hover { background: #ffebee; color: var(--danger); }
  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .model-badge {
    font-size: 12px; color: var(--text-secondary); background: #f5f5f5; padding: 4px 10px;
    border-radius: 6px; font-family: "SF Mono", Monaco, monospace;
  }
  .toggle {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); cursor: pointer;
    padding: 4px 8px; border-radius: 6px; transition: background 0.15s;
  }
  .toggle:hover { background: #f5f5f5; }
  .toggle input { display: none; }
  .toggle span { position: relative; padding-left: 36px; }
  .toggle span::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 28px; height: 16px; background: #ccc; border-radius: 8px; transition: background 0.2s;
  }
  .toggle span::after {
    content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: left 0.2s;
  }
  .toggle input:checked + span::before { background: var(--accent); }
  .toggle input:checked + span::after { left: 14px; }

  .send-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none; background: var(--text-secondary);
    color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: background 0.15s;
  }
  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { background: #e0e0e0; cursor: not-allowed; }

  /* Diff & Todo */
  .diff-box { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-top: 8px; overflow: hidden; }
  .diff-header { background: #f5f5f5; padding: 8px 12px; font-size: 12px; color: #555; border-bottom: 1px solid var(--border); font-family: "SF Mono", Monaco, monospace; }
  .diff-content { padding: 10px 12px; font-family: "SF Mono", Monaco, monospace; font-size: 12px; white-space: pre-wrap; line-height: 1.5; }
  .diff-add { background: #c8e6c9; color: #1b5e20; display: block; padding: 1px 4px; border-radius: 3px; }
  .diff-del { background: #ffcdd2; color: #b71c1c; display: block; padding: 1px 4px; border-radius: 3px; }

  .todo-box { margin-top: 8px; }
  .todo-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .todo-icon { font-size: 14px; width: 20px; text-align: center; }

  .shell-box { background: #1e1e1e; color: #aed581; padding: 12px; border-radius: var(--radius-sm); font-family: "SF Mono", Monaco, monospace; font-size: 13px; overflow-x: auto; margin-top: 8px; }

  /* Think */
  .think-toggle { cursor: pointer; color: #7b1fa2; font-size: 12px; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-weight: 500; }
  .think-toggle::before { content: '▶'; font-size: 10px; transition: transform 0.2s; }
  .think-toggle.open::before { transform: rotate(90deg); }
  .think-content { display: none; padding: 8px; background: rgba(255,255,255,0.5); border-radius: var(--radius-sm); }
  .think-content.open { display: block; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border-radius: 16px; padding: 24px; max-width: 520px; width: 90%;
    max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal h3 { margin: 0 0 16px; font-size: 18px; font-weight: 600; }
  .modal p { margin: 8px 0; font-size: 14px; color: #444; line-height: 1.5; }
  .modal .options { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
  .modal .option {
    padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: flex-start; gap: 10px; transition: all 0.15s;
  }
  .modal .option:hover { border-color: var(--accent); background: #f8fbff; }
  .modal .option.selected { border-color: var(--accent); background: #e3f2fd; }
  .modal .option input { margin-top: 3px; cursor: pointer; }
  .modal .option-label { font-weight: 500; font-size: 14px; }
  .modal .option-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .modal .buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .modal .btn { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 14px; transition: all 0.15s; }
  .modal .btn:hover { background: #f5f5f5; }
  .modal .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal .btn.primary:hover { background: var(--accent-hover); }
  .modal .btn.danger { color: var(--danger); border-color: #ffcdd2; }
  .modal .btn.danger:hover { background: #ffebee; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #aaa; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .chat-inner { padding: 0 12px; }
    .input-panel { padding: 10px 12px 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">K</div>
      <div class="logo-text">Kimi Wire</div>
      <div class="logo-version">MVP</div>
    </div>
    <div class="sidebar-content">
      <div class="section-title">SESSIONS</div>
      <div class="session-item active">
        <span>当前会话</span>
        <span class="session-time">now</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">Chat</div>
      <div class="topbar-path" id="workdir">kimi-learn</div>
    </header>

    <div class="chat-area" id="chat"><div class="chat-inner" id="chat-inner"></div></div>

    <div class="input-panel">
      <div class="status-bar">
        <div>
          <span class="dot" id="status-dot"></span>
          <span id="status-text">未连接</span>
        </div>
        <div class="context-bar">
          <span class="context-pill" id="status-files">0 files changed</span>
          <span class="context-pill" id="status-context">0% context</span>
        </div>
      </div>
      <div class="input-box">
        <textarea id="user-input" rows="1" placeholder="输入消息...（Shift+Enter换行，Enter发送）"></textarea>
        <div class="input-toolbar">
          <div class="toolbar-left">
            <button class="icon-btn" title="附件" onclick="alert('MVP暂未支持附件上传')">📎</button>
            <span class="model-badge">kimi-for-coding</span>
            <label class="toggle" title="显示思考过程">
              <input type="checkbox" id="thinking-toggle" checked>
              <span>Thinking</span>
            </label>
            <label class="toggle" title="Plan模式">
              <input type="checkbox" id="plan-toggle" onchange="togglePlanMode()">
              <span>Plan</span>
            </label>
          </div>
          <div class="toolbar-right">
            <button class="icon-btn danger" id="btn-cancel" title="取消" onclick="sendCancel()" disabled>✕</button>
            <button class="send-btn" id="btn-send" onclick="sendPrompt()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="modal-container"></div>

<script>
const chatInner = document.getElementById('chat-inner');
const userInput = document.getElementById('user-input');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const statusContext = document.getElementById('status-context');
const btnCancel = document.getElementById('btn-cancel');
const btnSend = document.getElementById('btn-send');
const planToggle = document.getElementById('plan-toggle');
const modalContainer = document.getElementById('modal-container');

let ws = null;
let isBusy = false;
let planMode = false;
let reconnectTimer = null;

function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => { setStatus('connected', '已连接'); };

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    setStatus('error', '已断开，5秒后重连...');
    setBusy(false);
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = () => { setStatus('error', '连接错误'); };
}

function setStatus(cls, text) {
  statusDot.className = 'dot ' + cls;
  statusText.textContent = text;
}

function setBusy(busy) {
  isBusy = busy;
  btnCancel.disabled = !busy;
  btnSend.disabled = busy;
  userInput.disabled = busy;
  if (busy) {
    statusText.textContent = '思考中...';
    statusDot.className = 'dot busy';
  }
}

function appendRow(className, html) {
  const row = document.createElement('div');
  row.className = 'message-row ' + className;
  row.innerHTML = html;
  chatInner.appendChild(row);
  scrollToBottom();
  return row;
}

function scrollToBottom() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

let currentAssistantRow = null;
let currentAssistantText = '';
let currentThinkRow = null;

function getAssistantRow() {
  if (!currentAssistantRow) {
    currentAssistantRow = appendRow('assistant', `
      <div class="avatar ai">AI</div>
      <div class="bubble assistant" id="current-bubble"></div>
    `);
  }
  return currentAssistantRow.querySelector('.bubble');
}

function handleMessage(msg) {
  const kind = msg.kind;
  const data = msg.data;

  if (kind === 'system') {
    const s = data.status;
    if (s === 'connected') setStatus('connected', '已连接');
    else if (s === 'disconnected') setStatus('error', '已断开');
    else if (s === 'error') setStatus('error', data.message || '错误');
    if (data.message && s !== 'connected') {
      appendRow('system', `<div class="bubble system">${escapeHtml(data.message)}</div>`);
    }
    return;
  }

  if (kind === 'error') {
    appendRow('system', `<div class="bubble error">错误: ${escapeHtml(data.message || JSON.stringify(data))}</div>`);
    setBusy(false);
    return;
  }

  if (kind !== 'wire') return;

  const wire = data;
  const method = wire.method;

  if (method === 'event') {
    handleEvent(wire.params);
    return;
  }

  if (method === 'request') {
    handleRequest(wire.id, wire.params);
    return;
  }

  if (wire.result || wire.error) {
    if (wire.error) {
      appendRow('system', `<div class="bubble error">请求错误: ${escapeHtml(wire.error.message)}</div>`);
    }
    if (kind === 'prompt_result') setBusy(false);
    return;
  }
}

function handleEvent(params) {
  const type = params.type;
  const payload = params.payload;

  switch (type) {
    case 'TurnBegin':
      setBusy(true);
      currentAssistantRow = null;
      currentAssistantText = '';
      currentThinkRow = null;
      const input = typeof payload.user_input === 'string' ? payload.user_input : '(多模态输入)';
      appendRow('user', `
        <div class="bubble user">${escapeHtml(input)}</div>
        <div class="avatar user">我</div>
      `);
      break;

    case 'TurnEnd':
      setBusy(false);
      flushAssistantText();
      currentAssistantRow = null;
      currentAssistantText = '';
      currentThinkRow = null;
      // Trigger code highlight
      document.querySelectorAll('pre code').forEach((block) => {
        if (window.hljs && !block.dataset.highlighted) { hljs.highlightElement(block); block.dataset.highlighted = 'yes'; }
      });
      break;

    case 'StepBegin':
      // silently track step number
      break;

    case 'ContentPart':
      if (payload.type === 'text') {
        currentAssistantText += payload.text;
        const bubble = getAssistantRow();
        bubble.innerHTML = marked.parse(currentAssistantText);
        scrollToBottom();
      } else if (payload.type === 'think') {
        if (!currentThinkRow) {
          currentThinkRow = appendRow('assistant', `
            <div class="avatar ai" style="visibility:hidden"></div>
            <div class="bubble think">
              <div class="think-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">思考过程</div>
              <div class="think-content"></div>
            </div>
          `);
        }
        currentThinkRow.querySelector('.think-content').textContent += payload.think;
        scrollToBottom();
      } else if (payload.type === 'image_url') {
        const bubble = getAssistantRow();
        bubble.innerHTML += `<img src="${escapeHtml(payload.image_url.url)}" alt="image">`;
        scrollToBottom();
      }
      break;

    case 'ToolCall':
      {
        const name = payload.function?.name || 'unknown';
        const args = payload.function?.arguments || '{}';
        let argsObj = {};
        try { argsObj = JSON.parse(args); } catch(e) {}
        const html = `<div class="avatar ai" style="visibility:hidden"></div>
          <div class="bubble tool">
            <div style="font-weight:600;color:var(--accent);margin-bottom:6px;">🔧 ${escapeHtml(name)}</div>
            <pre><code>${escapeHtml(JSON.stringify(argsObj, null, 2))}</code></pre>
          </div>`;
        appendRow('tool', html);
      }
      break;

    case 'ToolResult':
      {
        const rv = payload.return_value;
        let html = `<div class="avatar ai" style="visibility:hidden"></div><div class="bubble tool">`;
        if (rv.is_error) {
          html += `<div style="color:var(--danger);font-weight:600;">❌ 工具错误</div>`;
        } else {
          html += `<div style="color:var(--success);font-weight:600;">✅ 工具结果</div>`;
        }
        if (rv.message) html += `<p>${escapeHtml(rv.message)}</p>`;
        if (typeof rv.output === 'string') {
          html += `<pre><code>${escapeHtml(rv.output)}</code></pre>`;
        }
        if (rv.display) {
          rv.display.forEach(block => { html += renderDisplayBlock(block); });
        }
        html += `</div>`;
        appendRow('tool', html);
      }
      break;

    case 'StatusUpdate':
      if (payload.context_usage != null) {
        const pct = Math.round(payload.context_usage * 100);
        statusContext.textContent = pct + '% context';
        if (pct > 80) statusContext.style.color = 'var(--danger)';
        else if (pct > 60) statusContext.style.color = '#ff9800';
        else statusContext.style.color = 'var(--text-secondary)';
      }
      if (payload.plan_mode !== null && payload.plan_mode !== undefined) {
        planMode = payload.plan_mode;
        planToggle.checked = planMode;
      }
      break;

    case 'PlanDisplay':
      {
        const html = `<div class="avatar ai">AI</div>
          <div class="bubble assistant">
            <div style="font-weight:600;margin-bottom:8px;">📋 计划 <span style="font-size:12px;color:var(--text-secondary);">${escapeHtml(payload.file_path)}</span></div>
            <div>${marked.parse(payload.content)}</div>
          </div>`;
        appendRow('assistant', html);
      }
      break;

    case 'SteerInput':
      appendRow('system', `<div class="bubble system">📝 追加输入已接收</div>`);
      break;

    default:
      break;
  }
}

function flushAssistantText() {
  if (currentAssistantRow && currentAssistantText) {
    const bubble = currentAssistantRow.querySelector('.bubble');
    bubble.innerHTML = marked.parse(currentAssistantText);
  }
}

function renderDisplayBlock(block) {
  if (!block) return '';
  if (block.type === 'brief') return `<p>${escapeHtml(block.text)}</p>`;
  if (block.type === 'diff') return renderDiff(block.path, block.old_text, block.new_text);
  if (block.type === 'todo') return renderTodo(block.items);
  if (block.type === 'shell') return `<div class="shell-box">$ ${escapeHtml(block.command)}</div>`;
  return `<pre><code>${escapeHtml(JSON.stringify(block, null, 2))}</code></pre>`;
}

function renderDiff(path, oldText, newText) {
  const oldLines = (oldText || '').split('\n');
  const newLines = (newText || '').split('\n');
  let diffHtml = '';
  const maxLen = Math.max(oldLines.length, newLines.length);
  for (let i = 0; i < maxLen; i++) {
    const o = oldLines[i] || '';
    const n = newLines[i] || '';
    if (o === n) {
      diffHtml += escapeHtml(n) + '\n';
    } else {
      if (o) diffHtml += `<span class="diff-del">- ${escapeHtml(o)}</span>\n`;
      if (n) diffHtml += `<span class="diff-add">+ ${escapeHtml(n)}</span>\n`;
    }
  }
  return `<div class="diff-box">
    <div class="diff-header">${escapeHtml(path)}</div>
    <div class="diff-content">${diffHtml}</div>
  </div>`;
}

function renderTodo(items) {
  if (!items || !items.length) return '';
  let html = '<div class="todo-box">';
  items.forEach(item => {
    const icon = item.status === 'done' ? '✅' : item.status === 'in_progress' ? '⏳' : '⬜';
    html += `<div class="todo-item"><span class="todo-icon">${icon}</span><span>${escapeHtml(item.title)}</span></div>`;
  });
  html += '</div>';
  return html;
}

function handleRequest(id, params) {
  const type = params.type;
  const payload = params.payload;

  if (type === 'ApprovalRequest') {
    showApprovalModal(id, payload);
  } else if (type === 'QuestionRequest') {
    showQuestionModal(id, payload);
  } else if (type === 'ToolCallRequest') {
    sendResponse(id, { tool_call_id: payload.id, return_value: { is_error: true, output: "External tool not implemented", message: "External tool not implemented", display: [] }});
  }
}

function showApprovalModal(id, payload) {
  let displayHtml = '';
  if (payload.display) {
    payload.display.forEach(block => { displayHtml += renderDisplayBlock(block); });
  }
  window._lastApprovalPayload = payload;

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>🔒 需要确认</h3>
        <p><strong>操作:</strong> ${escapeHtml(payload.action)}</p>
        <p><strong>说明:</strong> ${escapeHtml(payload.description)}</p>
        ${displayHtml}
        <div class="buttons">
          <button class="btn danger" onclick="sendApproval('${id}', 'reject')">拒绝</button>
          <button class="btn" onclick="sendApproval('${id}', 'approve')">批准</button>
          <button class="btn primary" onclick="sendApproval('${id}', 'approve_for_session')">本会话批准</button>
        </div>
      </div>
    </div>
  `;
  modalContainer.innerHTML = html;
}

function showQuestionModal(id, payload) {
  const questions = payload.questions || [];
  window._lastQuestionPayload = payload;
  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><h3>❓ 请回答</h3>`;
  questions.forEach((q, qi) => {
    html += `<div style="margin-bottom:16px;" data-q="${escapeHtml(q.question)}">
      <p style="font-weight:600;margin-bottom:8px;">${escapeHtml(q.question)}</p>
      <div class="options" id="q-${qi}">`;
    q.options.forEach((opt) => {
      const inputType = q.multi_select ? 'checkbox' : 'radio';
      const name = q.multi_select ? `name="q-${qi}-opt"` : `name="q-${qi}"`;
      html += `<label class="option">
        <input type="${inputType}" ${name} value="${escapeHtml(opt.label)}" onchange="selectOption(this, ${qi})">
        <div>
          <div class="option-label">${escapeHtml(opt.label)}</div>
          <div class="option-desc">${escapeHtml(opt.description || '')}</div>
        </div>
      </label>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="buttons">
    <button class="btn" onclick="closeModal()">跳过</button>
    <button class="btn primary" onclick="sendQuestionAnswer('${id}')">确认</button>
  </div></div></div>`;
  modalContainer.innerHTML = html;
}

function selectOption(input, qIndex) {
  const container = document.getElementById('q-' + qIndex);
  container.querySelectorAll('.option').forEach(lbl => lbl.classList.remove('selected'));
  container.querySelectorAll('input:checked').forEach(inp => {
    inp.closest('.option').classList.add('selected');
  });
}

function sendApproval(id, response) {
  const payload = window._lastApprovalPayload;
  closeModal();
  sendResponse(id, { request_id: payload ? payload.id : id, response });
}

function sendQuestionAnswer(id) {
  const payload = window._lastQuestionPayload;
  const answers = {};
  document.querySelectorAll('.modal [data-q]').forEach(container => {
    const qText = container.getAttribute('data-q');
    const checked = Array.from(container.querySelectorAll('input:checked')).map(i => i.value);
    if (checked.length) answers[qText] = checked.join(',');
  });
  closeModal();
  sendResponse(id, { request_id: payload ? payload.id : id, answers });
}

function closeModal() {
  modalContainer.innerHTML = '';
}

function sendResponse(id, result) {
  ws.send(JSON.stringify({ kind: 'response', data: { id, result } }));
}

function sendPrompt() {
  const text = userInput.value.trim();
  if (!text || isBusy) return;
  userInput.value = '';
  userInput.style.height = 'auto';
  ws.send(JSON.stringify({ kind: 'prompt', data: { user_input: text } }));
}

function sendCancel() {
  if (!isBusy) return;
  ws.send(JSON.stringify({ kind: 'cancel', data: {} }));
}

function sendSteer(text) {
  if (!isBusy) return;
  ws.send(JSON.stringify({ kind: 'steer', data: { user_input: text } }));
}

function togglePlanMode() {
  ws.send(JSON.stringify({ kind: 'set_plan_mode', data: { enabled: !planMode } }));
}

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendPrompt();
  }
});

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
});

function escapeHtml(text) {
  if (text == null) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

connect();
</script>

</body>
</html>
