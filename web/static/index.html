<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimi Wire Web</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="icon-btn sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开" aria-label="收起侧边栏">‹</button>
      <div class="logo-icon">K</div>
      <div class="logo-text">Kimi Wire</div>
      <div class="logo-version">MVP</div>
    </div>
    <div class="sidebar-content">
      <div class="section-title">
        <span>SESSIONS</span>
        <button class="icon-btn small" id="btn-new-session" onclick="newSession()" title="新建会话">+</button>
      </div>
      <div id="session-list">
        <div class="session-item active" id="session-item-loading">
          <span>加载中...</span>
          <span class="session-time"></span>
        </div>
      </div>
    </div>
    <div class="usage-footer" id="usage-footer">
      <div class="usage-item">
        <span class="usage-label">周</span>
        <div class="usage-bar-wrap"><div class="usage-bar green" id="bar-week" style="width:0%"></div></div>
        <span class="usage-text" id="text-week">-/-</span>
      </div>
      <div class="usage-item">
        <span class="usage-label">5h</span>
        <div class="usage-bar-wrap"><div class="usage-bar green" id="bar-5h" style="width:0%"></div></div>
        <span class="usage-text" id="text-5h">-/-</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn drawer-btn mobile-only" id="btn-session-drawer" onclick="openSessionDrawer()" title="会话列表" aria-label="打开会话列表"><span class="icon icon-menu"></span></button>
      <div class="topbar-title">Chat</div>
      <div class="topbar-path" id="workdir">kimi-learn</div>
      <button class="icon-btn drawer-btn mobile-only" id="btn-file-drawer" onclick="openFileDrawer()" title="文件列表" aria-label="打开文件列表"><span class="icon icon-folder"></span></button>
    </header>

    <div class="main-body" id="main-body">
      <div class="chat-panel" id="chat-panel">
        <div class="chat-area" id="chat"><div class="chat-inner" id="chat-inner"></div></div>
        <div class="input-panel">
          <div class="status-bar">
            <div>
              <span class="dot" id="status-dot"></span>
              <span id="status-text">未连接</span>
            </div>
            <div class="skill-bar" id="skill-bar">
              <button class="skill-btn" data-skill="generate-practice" onclick="activateSkill('generate-practice', '生成练习题')">生成练习题</button>
              <button class="skill-btn" data-skill="generate-reports" onclick="activateSkill('generate-reports', '生成报告')">生成报告</button>
              <button class="skill-btn" data-skill="generate-review" onclick="activateSkill('generate-review', '生成复习')">生成复习</button>
              <button class="skill-btn" data-skill="upload-exam" onclick="activateSkill('upload-exam', '上传题目')">上传题目</button>
              <button class="skill-btn" data-skill="upload-raw" onclick="activateSkill('upload-raw', '上传源文件')">上传源文件</button>
            </div>
            <div class="context-bar">
              <span class="context-pill" id="status-files">0 files changed</span>
              <span class="context-pill" id="status-context">0% context</span>
            </div>
          </div>
          <div class="skill-pill-container" id="skill-pill-container" style="display:none">
            <span class="skill-pill" id="active-skill-pill">
              <span id="active-skill-label"></span>
              <button class="skill-pill-remove" onclick="clearSkill()" title="取消"><span class="icon icon-close"></span></button>
            </span>
          </div>
          <div class="input-box">
            <div id="attachment-preview" class="attachment-preview" style="display:none"></div>
            <textarea id="user-input" rows="1" placeholder="输入消息...（Shift+Enter换行，Enter发送）"></textarea>
            <div class="input-toolbar">
              <div class="toolbar-left">
                <input type="file" id="file-input" style="display:none" accept="image/*,application/pdf,.doc,.docx,.txt,.md" multiple onchange="handleFileSelect(event)">
                <button class="icon-btn" title="附件" onclick="document.getElementById('file-input').click()"><span class="icon icon-attach"></span></button>
                <button class="icon-btn mobile-only" title="拍照" onclick="triggerCamera()"><span class="icon icon-camera"></span></button>
                <span class="model-badge">kimi-for-coding</span>
                <label class="toggle" title="显示思考过程">
                  <input type="checkbox" id="thinking-toggle" checked>
                  <span>Thinking</span>
                </label>
                <label class="toggle" title="Plan模式">
                  <input type="checkbox" id="plan-toggle" onchange="togglePlanMode()">
                  <span>Plan</span>
                </label>
              </div>
              <div class="toolbar-right">
                <button class="icon-btn danger" id="btn-cancel" title="取消" onclick="sendCancel()" disabled><span class="icon icon-close"></span></button>
                <button class="send-btn" id="btn-send" onclick="sendPrompt()"><span class="icon icon-send"></span></button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="file-panel" id="file-panel" style="display:none">
        <div class="file-panel-header">
          <span class="file-panel-title" id="file-panel-title"></span>
          <button class="icon-btn" onclick="closeFilePanel()" title="关闭"><span class="icon icon-close"></span></button>
        </div>
        <div class="file-panel-content" id="file-panel-content"></div>
      </div>
    </div>
  </main>

  <aside class="file-sidebar" id="file-sidebar">
    <div class="file-sidebar-header">
      <button class="icon-btn sidebar-toggle" id="file-sidebar-toggle" onclick="toggleFileSidebar()" title="收起/展开" aria-label="收起文件侧边栏">›</button>
      <span>文件</span>
      <label class="toggle small" title="展示全部文件">
        <input type="checkbox" id="show-all-toggle" onchange="toggleShowAll()">
        <span>全部</span>
      </label>
    </div>
    <div class="file-sidebar-tree" id="file-sidebar-tree"></div>
  </aside>
</div>

<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawers()"></div>
<input type="file" id="camera-input" style="display:none" accept="image/*" capture="environment" onchange="handleFileSelect(event)">
<div id="modal-container"></div>

<script src="/static/app.js"></script>

</body>
</html>
