<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimi Wire Web</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f5; height: 100vh; display: flex; flex-direction: column;
  }
  #header {
    background: #fff; border-bottom: 1px solid #e0e0e0; padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #status {
    font-size: 14px; display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
  .dot.connected { background: #4caf50; }
  .dot.busy { background: #ff9800; }
  .dot.error { background: #f44336; }
  #actions { display: flex; gap: 8px; }
  button {
    padding: 6px 14px; border: 1px solid #d0d0d0; border-radius: 6px;
    background: #fff; cursor: pointer; font-size: 14px;
  }
  button:hover { background: #f0f0f0; }
  button.primary { background: #1976d2; color: #fff; border-color: #1976d2; }
  button.primary:hover { background: #1565c0; }
  button.danger { background: #d32f2f; color: #fff; border-color: #d32f2f; }
  button.danger:hover { background: #c62828; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #chat {
    flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: 90%; padding: 12px 14px; border-radius: 10px; font-size: 15px; line-height: 1.6;
    word-break: break-word;
  }
  .msg.user { align-self: flex-end; background: #e3f2fd; }
  .msg.assistant { align-self: flex-start; background: #fff; border: 1px solid #e0e0e0; }
  .msg.system { align-self: center; background: #fff9c4; font-size: 13px; color: #666; }
  .msg.think { align-self: flex-start; background: #f3e5f5; font-size: 13px; color: #555; }
  .msg.tool { align-self: flex-start; background: #e8f5e9; font-size: 13px; }
  .msg.error { align-self: center; background: #ffebee; color: #c62828; font-size: 13px; }

  .msg h1, .msg h2, .msg h3, .msg h4 { margin: 8px 0 4px; }
  .msg p { margin: 4px 0; }
  .msg pre {
    background: #263238; color: #aed581; padding: 10px; border-radius: 6px;
    overflow-x: auto; font-size: 13px;
  }
  .msg code {
    background: #eceff1; padding: 2px 4px; border-radius: 4px; font-size: 13px;
  }
  .msg pre code { background: transparent; padding: 0; }
  .msg ul, .msg ol { margin: 4px 0; padding-left: 20px; }
  .msg img { max-width: 100%; border-radius: 6px; }

  .diff-box { border: 1px solid #ccc; border-radius: 6px; margin-top: 6px; overflow: hidden; }
  .diff-header { background: #f5f5f5; padding: 6px 10px; font-size: 12px; color: #555; border-bottom: 1px solid #ddd; }
  .diff-content { padding: 8px 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
  .diff-add { background: #c8e6c9; color: #1b5e20; }
  .diff-del { background: #ffcdd2; color: #b71c1c; }

  .todo-box { margin-top: 6px; }
  .todo-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .todo-icon { font-size: 16px; }

  #input-area {
    background: #fff; border-top: 1px solid #e0e0e0; padding: 12px 16px;
    display: flex; gap: 10px; flex-shrink: 0; align-items: flex-end;
  }
  #input-area textarea {
    flex: 1; resize: none; border: 1px solid #d0d0d0; border-radius: 8px;
    padding: 10px 12px; font-size: 15px; line-height: 1.4; max-height: 200px;
    font-family: inherit;
  }
  #input-area textarea:focus { outline: none; border-color: #1976d2; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: #fff; border-radius: 12px; padding: 20px; max-width: 480px; width: 90%;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .modal h3 { margin: 0 0 12px; font-size: 18px; }
  .modal p { margin: 6px 0; font-size: 14px; color: #444; }
  .modal .options { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
  .modal .option {
    padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .modal .option:hover { background: #f5f5f5; }
  .modal .option.selected { border-color: #1976d2; background: #e3f2fd; }
  .modal .option input { cursor: pointer; }
  .modal .buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  .tool-name { font-weight: bold; color: #2e7d32; }
  .shell-box { background: #263238; color: #aed581; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 13px; overflow-x: auto; margin-top: 6px; }
  .think-toggle { cursor: pointer; color: #7b1fa2; font-size: 12px; margin-bottom: 4px; }
  .think-content { display: none; }
  .think-content.open { display: block; }
</style>
</head>
<body>

<div id="header">
  <div id="status"><span class="dot" id="status-dot"></span><span id="status-text">未连接</span></div>
  <div id="actions">
    <button id="btn-plan" onclick="togglePlanMode()">Plan模式</button>
    <button id="btn-cancel" class="danger" onclick="sendCancel()" disabled>取消</button>
  </div>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="user-input" rows="2" placeholder="输入消息...（Shift+Enter换行，Enter发送）"></textarea>
  <button class="primary" onclick="sendPrompt()">发送</button>
</div>

<div id="modal-container"></div>

<script>
const chat = document.getElementById('chat');
const userInput = document.getElementById('user-input');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const btnCancel = document.getElementById('btn-cancel');
const modalContainer = document.getElementById('modal-container');

let ws = null;
let isBusy = false;
let planMode = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    setStatus('connected', '已连接');
  };

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    setStatus('error', '已断开，5秒后重连...');
    setBusy(false);
    setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    setStatus('error', '连接错误');
  };
}

function setStatus(cls, text) {
  statusDot.className = 'dot ' + cls;
  statusText.textContent = text;
}

function setBusy(busy) {
  isBusy = busy;
  btnCancel.disabled = !busy;
  userInput.disabled = busy;
}

function appendHtml(html, className) {
  const div = document.createElement('div');
  div.className = 'msg ' + className;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function appendText(text, className) {
  const div = document.createElement('div');
  div.className = 'msg ' + className;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

let currentAssistantDiv = null;
let currentAssistantText = '';
let currentThinkDiv = null;

function getAssistantDiv() {
  if (!currentAssistantDiv) {
    currentAssistantDiv = appendHtml('', 'assistant');
  }
  return currentAssistantDiv;
}

function flushAssistantText() {
  if (currentAssistantDiv && currentAssistantText) {
    currentAssistantDiv.innerHTML = marked.parse(currentAssistantText);
    chat.scrollTop = chat.scrollHeight;
  }
}

function handleMessage(msg) {
  const kind = msg.kind;
  const data = msg.data;

  if (kind === 'system') {
    const s = data.status;
    if (s === 'connected') setStatus('connected', '已连接');
    else if (s === 'disconnected') setStatus('error', '已断开');
    else if (s === 'error') setStatus('error', data.message || '错误');
    if (data.message) appendText('[系统] ' + data.message, 'system');
    return;
  }

  if (kind === 'error') {
    appendText('错误: ' + (data.message || JSON.stringify(data)), 'error');
    setBusy(false);
    return;
  }

  if (kind !== 'wire') return;

  const wire = data;
  const method = wire.method;

  // Event notification (no id)
  if (method === 'event') {
    handleEvent(wire.params);
    return;
  }

  // Request from agent (has id)
  if (method === 'request') {
    handleRequest(wire.id, wire.params);
    return;
  }

  // Response to our prompt/cancel/steer
  if (wire.result || wire.error) {
    if (wire.error) {
      appendText('请求错误: ' + wire.error.message, 'error');
    }
    setBusy(false);
    return;
  }
}

function handleEvent(params) {
  const type = params.type;
  const payload = params.payload;

  switch (type) {
    case 'TurnBegin':
      setBusy(true);
      currentAssistantDiv = null;
      currentThinkDiv = null;
      const input = typeof payload.user_input === 'string' ? payload.user_input : '(多模态输入)';
      appendText('你: ' + input, 'user');
      break;

    case 'TurnEnd':
      setBusy(false);
      flushAssistantText();
      currentAssistantDiv = null;
      currentAssistantText = '';
      currentThinkDiv = null;
      break;

    case 'StepBegin':
      // optionally show step number
      break;

    case 'ContentPart':
      if (payload.type === 'text') {
        currentAssistantText += payload.text;
        const div = getAssistantDiv();
        div.innerHTML = marked.parse(currentAssistantText);
        chat.scrollTop = chat.scrollHeight;
      } else if (payload.type === 'think') {
        if (!currentThinkDiv) {
          currentThinkDiv = document.createElement('div');
          currentThinkDiv.className = 'msg think';
          const toggle = document.createElement('div');
          toggle.className = 'think-toggle';
          toggle.textContent = '▶ 思考过程';
          const content = document.createElement('div');
          content.className = 'think-content';
          currentThinkDiv.appendChild(toggle);
          currentThinkDiv.appendChild(content);
          chat.appendChild(currentThinkDiv);
          toggle.onclick = () => {
            content.classList.toggle('open');
            toggle.textContent = content.classList.contains('open') ? '▼ 思考过程' : '▶ 思考过程';
          };
        }
        currentThinkDiv.querySelector('.think-content').textContent += payload.think;
        chat.scrollTop = chat.scrollHeight;
      } else if (payload.type === 'image_url') {
        const div = getAssistantDiv();
        div.innerHTML += `<img src="${payload.image_url.url}" alt="image">`;
        chat.scrollTop = chat.scrollHeight;
      }
      break;

    case 'ToolCall':
      {
        const name = payload.function?.name || 'unknown';
        const args = payload.function?.arguments || '{}';
        let argsObj = {};
        try { argsObj = JSON.parse(args); } catch(e) {}
        const html = `<div class="tool-name">🔧 ${name}</div><pre><code>${JSON.stringify(argsObj, null, 2)}</code></pre>`;
        appendHtml(html, 'tool');
      }
      break;

    case 'ToolResult':
      {
        const rv = payload.return_value;
        let html = '';
        if (rv.is_error) {
          html += `<div style="color:#c62828;font-weight:bold;">❌ 工具错误</div>`;
        } else {
          html += `<div style="color:#2e7d32;font-weight:bold;">✅ 工具结果</div>`;
        }
        if (rv.message) html += `<p>${escapeHtml(rv.message)}</p>`;
        if (typeof rv.output === 'string') {
          html += `<pre><code>${escapeHtml(rv.output)}</code></pre>`;
        }
        if (rv.display) {
          rv.display.forEach(block => {
            html += renderDisplayBlock(block);
          });
        }
        appendHtml(html, 'tool');
      }
      break;

    case 'StatusUpdate':
      if (payload.plan_mode !== null && payload.plan_mode !== undefined) {
        planMode = payload.plan_mode;
        document.getElementById('btn-plan').textContent = planMode ? '退出Plan' : 'Plan模式';
      }
      break;

    case 'PlanDisplay':
      {
        const html = `<div style="font-weight:bold;margin-bottom:6px;">📋 计划 (${escapeHtml(payload.file_path)})</div>` +
          `<div>${marked.parse(payload.content)}</div>`;
        appendHtml(html, 'assistant');
      }
      break;

    case 'SteerInput':
      appendText('📝 追加输入已接收', 'system');
      break;

    default:
      // ignore other events
      break;
  }
}

function renderDisplayBlock(block) {
  if (!block) return '';
  if (block.type === 'brief') {
    return `<p>${escapeHtml(block.text)}</p>`;
  }
  if (block.type === 'diff') {
    return renderDiff(block.path, block.old_text, block.new_text);
  }
  if (block.type === 'todo') {
    return renderTodo(block.items);
  }
  if (block.type === 'shell') {
    return `<div class="shell-box">$ ${escapeHtml(block.command)}</div>`;
  }
  return `<pre><code>${escapeHtml(JSON.stringify(block, null, 2))}</code></pre>`;
}

function renderDiff(path, oldText, newText) {
  const oldLines = (oldText || '').split('\n');
  const newLines = (newText || '').split('\n');
  // Simple line diff
  let diffHtml = '';
  const maxLen = Math.max(oldLines.length, newLines.length);
  for (let i = 0; i < maxLen; i++) {
    const o = oldLines[i] || '';
    const n = newLines[i] || '';
    if (o === n) {
      diffHtml += escapeHtml(n) + '\n';
    } else {
      if (o) diffHtml += `<span class="diff-del">- ${escapeHtml(o)}</span>\n`;
      if (n) diffHtml += `<span class="diff-add">+ ${escapeHtml(n)}</span>\n`;
    }
  }
  return `<div class="diff-box">
    <div class="diff-header">${escapeHtml(path)}</div>
    <div class="diff-content">${diffHtml}</div>
  </div>`;
}

function renderTodo(items) {
  if (!items || !items.length) return '';
  let html = '<div class="todo-box">';
  items.forEach(item => {
    const icon = item.status === 'done' ? '✅' : item.status === 'in_progress' ? '⏳' : '⬜';
    html += `<div class="todo-item"><span class="todo-icon">${icon}</span><span>${escapeHtml(item.title)}</span></div>`;
  });
  html += '</div>';
  return html;
}

function handleRequest(id, params) {
  const type = params.type;
  const payload = params.payload;

  if (type === 'ApprovalRequest') {
    showApprovalModal(id, payload);
  } else if (type === 'QuestionRequest') {
    showQuestionModal(id, payload);
  } else if (type === 'ToolCallRequest') {
    // External tool call - auto-reject for MVP since we have no external tools defined
    sendResponse(id, { tool_call_id: payload.id, return_value: { is_error: true, output: "External tool not implemented", message: "External tool not implemented", display: [] }});
  }
}

function showApprovalModal(id, payload) {
  let displayHtml = '';
  if (payload.display) {
    payload.display.forEach(block => {
      displayHtml += renderDisplayBlock(block);
    });
  }
  // Store payload id for response
  window._lastApprovalPayload = payload;

  const html = `
    <div class="modal-overlay" id="modal-approval">
      <div class="modal">
        <h3>🔒 需要确认</h3>
        <p><strong>操作:</strong> ${escapeHtml(payload.action)}</p>
        <p><strong>说明:</strong> ${escapeHtml(payload.description)}</p>
        ${displayHtml}
        <div class="buttons">
          <button onclick="sendApproval('${id}', 'reject')">拒绝</button>
          <button onclick="sendApproval('${id}', 'approve')">批准</button>
          <button class="primary" onclick="sendApproval('${id}', 'approve_for_session')">本会话批准</button>
        </div>
      </div>
    </div>
  `;
  modalContainer.innerHTML = html;
}

function showQuestionModal(id, payload) {
  const questions = payload.questions || [];
  window._lastQuestionPayload = payload;
  let html = `<div class="modal-overlay" id="modal-question"><div class="modal"><h3>❓ 请回答</h3>`;
  questions.forEach((q, qi) => {
    html += `<div style="margin-bottom:12px;" data-q="${escapeHtml(q.question)}"><p><strong>${escapeHtml(q.question)}</strong></p>`;
    html += `<div class="options" id="q-${qi}">`;
    q.options.forEach((opt, oi) => {
      const inputType = q.multi_select ? 'checkbox' : 'radio';
      const name = q.multi_select ? `name="q-${qi}-${oi}"` : `name="q-${qi}"`;
      html += `<label class="option">
        <input type="${inputType}" ${name} value="${escapeHtml(opt.label)}" onchange="selectOption(this, ${qi})">
        <div><div style="font-weight:bold;">${escapeHtml(opt.label)}</div><div style="font-size:12px;color:#666;">${escapeHtml(opt.description || '')}</div></div>
      </label>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="buttons"><button onclick="closeModal()">跳过</button><button class="primary" onclick="sendQuestionAnswer('${id}')">确认</button></div></div></div>`;
  modalContainer.innerHTML = html;
}

function selectOption(input, qIndex) {
  const container = document.getElementById('q-' + qIndex);
  container.querySelectorAll('.option').forEach(lbl => lbl.classList.remove('selected'));
  container.querySelectorAll('input:checked').forEach(inp => {
    inp.closest('.option').classList.add('selected');
  });
}

function sendApproval(id, response) {
  const payload = window._lastApprovalPayload;
  closeModal();
  sendResponse(id, { request_id: payload ? payload.id : id, response });
}

function sendQuestionAnswer(id) {
  const payload = window._lastQuestionPayload;
  const answers = {};
  document.querySelectorAll('.modal [data-q]').forEach(container => {
    const qText = container.getAttribute('data-q');
    const checked = Array.from(container.querySelectorAll('input:checked')).map(i => i.value);
    if (checked.length) answers[qText] = checked.join(',');
  });
  closeModal();
  sendResponse(id, { request_id: payload ? payload.id : id, answers });
}

function closeModal() {
  modalContainer.innerHTML = '';
}

function sendResponse(id, result) {
  ws.send(JSON.stringify({ kind: 'response', data: { id, result } }));
}

function sendPrompt() {
  const text = userInput.value.trim();
  if (!text || isBusy) return;
  userInput.value = '';
  ws.send(JSON.stringify({ kind: 'prompt', data: { user_input: text } }));
}

function sendCancel() {
  if (!isBusy) return;
  ws.send(JSON.stringify({ kind: 'cancel', data: {} }));
}

function sendSteer(text) {
  if (!isBusy) return;
  ws.send(JSON.stringify({ kind: 'steer', data: { user_input: text } }));
}

function togglePlanMode() {
  ws.send(JSON.stringify({ kind: 'set_plan_mode', data: { enabled: !planMode } }));
}

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendPrompt();
  }
});

function escapeHtml(text) {
  if (text == null) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

connect();
</script>

</body>
</html>
